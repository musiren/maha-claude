<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maha Claude</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       #0f0f0f;
  --sidebar:  #141414;
  --surface:  #1c1c1c;
  --surface2: #252525;
  --border:   #2a2a2a;
  --text:     #ececec;
  --text2:    #a0a0a0;
  --text3:    #606060;
  --blue:     #5b8af5;
  --blue-h:   #3d6de0;
  --green:    #34d399;
  --red:      #f87171;
  --amber:    #fbbf24;
  --purple:   #a78bfa;
  --SW: 256px;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:15px;line-height:1.6;}
button{font-family:inherit;cursor:pointer}
textarea{font-family:inherit}
a{color:var(--blue);text-decoration:none}

/* ===== LAYOUT ===== */
.app{display:flex;height:100vh;overflow:hidden}

/* ===== SIDEBAR ===== */
.sb{
  width:var(--SW);min-width:var(--SW);
  background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  transition:transform .2s;
}
.sb-top{padding:12px 10px 8px;display:flex;flex-direction:column;gap:4px}
.sb-brand{
  display:flex;align-items:center;gap:10px;
  padding:8px 6px;border-radius:10px;
  margin-bottom:4px;
}
.sb-brand .icon{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:#fff;
}
.sb-brand span{font-size:15px;font-weight:600}
.new-chat{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:9px;border:1px solid var(--border);
  background:transparent;color:var(--text2);
  font-size:13px;transition:all .15s;width:100%;
}
.new-chat:hover{background:var(--surface);color:var(--text);border-color:var(--surface2)}
.new-chat svg{flex-shrink:0}

.sb-section{padding:4px 10px 2px}
.sb-section-label{
  font-size:11px;text-transform:uppercase;letter-spacing:.07em;
  color:var(--text3);padding:8px 4px 4px;
}
.cmd-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 8px;border-radius:8px;cursor:pointer;
  transition:background .12s;
}
.cmd-item:hover{background:var(--surface)}
.cmd-item .ci-icon{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
}
.cmd-item .ci-text{min-width:0;flex:1}
.cmd-item .ci-name{
  font-size:12px;font-weight:500;font-family:monospace;
  color:var(--blue);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.cmd-item .ci-desc{font-size:11px;color:var(--text3);margin-top:1px}
.ci-badge{
  font-size:10px;padding:1px 6px;border-radius:12px;flex-shrink:0;
  background:rgba(251,191,36,.12);color:var(--amber);
  border:1px solid rgba(251,191,36,.2);
}

.sb-footer{
  margin-top:auto;padding:10px;
  border-top:1px solid var(--border);
}
.user-row{
  display:flex;align-items:center;gap:9px;
  padding:7px 8px;border-radius:9px;
  transition:background .12s;cursor:pointer;
}
.user-row:hover{background:var(--surface)}
.user-avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;
}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-sess{font-size:10px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logout-btn{
  padding:5px;border-radius:6px;background:transparent;border:none;
  color:var(--text3);transition:all .12s;flex-shrink:0;
}
.logout-btn:hover{background:var(--surface2);color:var(--text)}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

/* topbar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;border-bottom:1px solid var(--border);
  background:var(--bg);flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:10px}
.conn-badge{
  display:flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:20px;font-size:12px;
  background:rgba(52,211,153,.1);color:var(--green);
  border:1px solid rgba(52,211,153,.2);
}
.conn-badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.topbar-gw{font-size:12px;color:var(--text3)}

/* ===== CHAT AREA ===== */
.chat-area{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;
}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* welcome */
.welcome-view{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 20px;
  gap:6px;
}
.wv-icon{
  width:64px;height:64px;border-radius:18px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:800;color:#fff;
  margin-bottom:8px;
}
.wv-title{font-size:22px;font-weight:700;color:var(--text)}
.wv-sub{font-size:14px;color:var(--text2);margin-top:2px}
.wv-chips{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  margin-top:16px;
}
.wv-chip{
  padding:6px 14px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);
  font-size:12px;font-family:monospace;color:var(--blue);
  cursor:pointer;transition:all .15s;
}
.wv-chip:hover{border-color:var(--blue);background:rgba(91,138,245,.08)}

/* messages */
.msgs-view{padding:16px 0}
.msg-row{
  display:flex;gap:12px;
  padding:12px 24px;
  transition:background .1s;
}
.msg-row:hover{background:rgba(255,255,255,.02)}
.msg-row.user-row-msg{
  flex-direction:row-reverse;
}
.msg-avatar{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
  margin-top:2px;
}
.msg-row.bot-row .msg-avatar{
  background:linear-gradient(135deg,var(--green),var(--blue));
}
.msg-row.user-row-msg .msg-avatar{
  background:linear-gradient(135deg,var(--blue),var(--purple));
}
.msg-content{flex:1;min-width:0;max-width:720px}
.msg-row.user-row-msg .msg-content{
  background:var(--surface);border-radius:14px 14px 4px 14px;
  padding:10px 14px;max-width:66%;flex:unset;
}
.msg-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.msg-name{font-size:13px;font-weight:600}
.msg-time{font-size:11px;color:var(--text3)}
.msg-body{font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word}
.msg-body pre{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:12px;overflow-x:auto;
  font-size:13px;line-height:1.5;margin:8px 0;white-space:pre;
}
.msg-body.error-body{color:var(--red)}
.typing::after{
  content:'●';margin-left:2px;
  animation:pulse .9s ease-in-out infinite;color:var(--blue);
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* approval */
.approval-card{
  background:rgba(251,191,36,.07);
  border:1px solid rgba(251,191,36,.25);
  border-radius:10px;padding:12px 14px;margin-top:4px;
}
.approval-msg{font-size:13px;color:var(--amber);margin-bottom:10px}
.approval-btns{display:flex;gap:8px}
.btn-approve{
  padding:5px 16px;border-radius:7px;border:none;
  background:var(--green);color:#000;font-size:12px;font-weight:600;
  transition:opacity .15s;
}
.btn-reject{
  padding:5px 16px;border-radius:7px;border:none;
  background:transparent;color:var(--red);font-size:12px;font-weight:600;
  border:1px solid rgba(248,113,113,.35);transition:all .15s;
}
.btn-approve:hover{opacity:.85}
.btn-reject:hover{background:rgba(248,113,113,.1)}
.btn-approve:disabled,.btn-reject:disabled{opacity:.4;cursor:not-allowed}

/* ===== INPUT AREA ===== */
.input-area{
  padding:12px 20px 16px;
  background:var(--bg);flex-shrink:0;
}
.input-outer{
  max-width:760px;margin:0 auto;position:relative;
}
.sugg-box{
  position:absolute;bottom:100%;left:0;right:0;margin-bottom:6px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;z-index:20;box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.sugg-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;cursor:pointer;transition:background .1s;
}
.sugg-item:hover,.sugg-item.on{background:var(--surface2)}
.si-cmd{font-family:monospace;font-size:13px;color:var(--blue);min-width:100px}
.si-desc{font-size:12px;color:var(--text3)}
.si-note{font-size:11px;color:var(--amber);margin-left:auto;flex-shrink:0}

.input-box{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:10px 10px 10px 16px;
  transition:border-color .2s;box-shadow:0 2px 10px rgba(0,0,0,.2);
}
.input-box:focus-within{border-color:var(--blue)}
#inp{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-size:14px;resize:none;
  min-height:24px;max-height:140px;line-height:1.6;
}
#inp::placeholder{color:var(--text3)}
.send-btn{
  width:36px;height:36px;border-radius:9px;border:none;
  background:var(--blue);color:#fff;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s;
}
.send-btn:hover:not(:disabled){background:var(--blue-h)}
.send-btn:disabled{background:var(--surface2);cursor:not-allowed}
.input-hint{
  text-align:center;font-size:11px;color:var(--text3);
  margin-top:8px;
}

/* ===== LOGIN ===== */
.login-overlay{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:999;
}
.login-box{
  width:360px;background:var(--surface);
  border:1px solid var(--border);border-radius:16px;
  padding:36px 32px;box-shadow:0 16px 48px rgba(0,0,0,.5);
}
.login-head{text-align:center;margin-bottom:28px}
.login-icon{
  width:54px;height:54px;border-radius:14px;margin:0 auto 12px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;color:#fff;
}
.login-title{font-size:20px;font-weight:700}
.login-sub{font-size:13px;color:var(--text2);margin-top:3px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.field input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;padding:10px 12px;color:var(--text);font-size:14px;
  outline:none;transition:border-color .2s;
}
.field input:focus{border-color:var(--blue)}
.btn-primary{
  width:100%;padding:11px;border-radius:10px;border:none;
  background:var(--blue);color:#fff;font-size:14px;font-weight:600;
  margin-top:8px;transition:background .15s;
}
.btn-primary:hover:not(:disabled){background:var(--blue-h)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.login-err{
  font-size:12px;color:var(--red);text-align:center;
  margin-top:10px;min-height:16px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="login-overlay">
<div class="login-box">
  <div class="login-head">
    <div class="login-icon">M</div>
    <div class="login-title">Maha Claude</div>
    <div class="login-sub">Gateway에 연결하여 시작하세요</div>
  </div>
  <div class="field">
    <label>Gateway URL</label>
    <input id="f-gw" value="http://localhost:8000">
  </div>
  <div class="field">
    <label>사용자명</label>
    <input id="f-user" placeholder="admin" autocomplete="username">
  </div>
  <div class="field">
    <label>비밀번호</label>
    <input id="f-pass" type="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-primary" id="login-btn" onclick="doLogin()">로그인</button>
  <div class="login-err" id="login-err"></div>
</div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">

  <!-- SIDEBAR -->
  <aside class="sb" id="sb">
    <div class="sb-top">
      <div class="sb-brand">
        <div class="icon">M</div>
        <span>Maha Claude</span>
      </div>
      <button class="new-chat" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        새 채팅
      </button>
    </div>

    <div class="sb-section">
      <div class="sb-section-label">커맨드</div>
      <div id="cmd-list"></div>
    </div>

    <div class="sb-footer">
      <div class="user-row">
        <div class="user-avatar" id="u-avatar">U</div>
        <div class="user-info">
          <div class="user-name" id="u-name">-</div>
          <div class="user-sess" id="u-sess">세션 없음</div>
        </div>
        <button class="logout-btn" onclick="doLogout()" title="로그아웃">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="conn-badge" id="conn-badge">
          <span class="dot"></span>연결됨
        </div>
      </div>
      <div class="topbar-gw" id="topbar-gw"></div>
    </div>

    <div class="chat-area" id="chat-area">
      <div class="welcome-view" id="welcome">
        <div class="wv-icon">M</div>
        <div class="wv-title">무엇을 도와드릴까요?</div>
        <div class="wv-sub">슬래시 커맨드를 입력하거나 아래 버튼을 클릭하세요</div>
        <div class="wv-chips" id="wv-chips"></div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-outer">
        <div class="sugg-box" id="sugg-box" style="display:none"></div>
        <div class="input-box">
          <textarea id="inp" rows="1"
            placeholder="메시지 입력 또는 /로 커맨드 시작..."
            oninput="onInput(this)" onkeydown="onKey(event)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMsg()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div class="input-hint">Enter 전송 · Shift+Enter 줄바꿈 · / 커맨드</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── state ──────────────────────────────────────────────────────────────────
let GW = 'http://localhost:8000';
let token = null, sessId = null, userName = null;
let cmds = [], busy = false;

// ── login ──────────────────────────────────────────────────────────────────
document.getElementById('f-user').onkeydown = e => e.key==='Enter' && document.getElementById('f-pass').focus();
document.getElementById('f-pass').onkeydown = e => e.key==='Enter' && doLogin();

async function doLogin() {
  GW = document.getElementById('f-gw').value.trim().replace(/\/+$/,'');
  const u = document.getElementById('f-user').value.trim();
  const p = document.getElementById('f-pass').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');
  if (!u || !p) { err.textContent = '사용자명과 비밀번호를 입력하세요'; return; }
  btn.disabled = true; btn.textContent = '연결 중…'; err.textContent = '';
  try {
    let r = await fetch(`${GW}/auth/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:u, password:p})
    });
    if (!r.ok) throw new Error((await r.json()).detail?.message || `HTTP ${r.status}`);
    token = (await r.json()).token;
    userName = u;

    r = await fetch(`${GW}/session/start`, {
      method:'POST', headers:{Authorization:`Bearer ${token}`}
    });
    if (!r.ok) throw new Error('세션 시작 실패');
    sessId = (await r.json()).session_id;

    await fetchCmds();
    mountApp();
  } catch(e) {
    err.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = '로그인';
  }
}

async function fetchCmds() {
  try {
    const r = await fetch(`${GW}/commands`, {headers:{Authorization:`Bearer ${token}`}});
    cmds = await r.json();
  } catch { cmds = []; }
}

function mountApp() {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('u-name').textContent = userName;
  document.getElementById('u-avatar').textContent = userName[0].toUpperCase();
  document.getElementById('u-sess').textContent = 'sess: ' + sessId.slice(0,8) + '…';
  document.getElementById('topbar-gw').textContent = GW;
  renderCmds();
}

function renderCmds() {
  const icons={'/echo':'💬','/help':'❓','/status':'📡','/run-tests':'🧪'};
  document.getElementById('cmd-list').innerHTML = cmds.map(c=>`
    <div class="cmd-item" onclick="insertCmd('${c.command}')">
      <div class="ci-icon">${icons[c.command]||'⌘'}</div>
      <div class="ci-text">
        <div class="ci-name">${c.command}</div>
        <div class="ci-desc">${c.description}</div>
      </div>
      ${c.requires_approval?'<span class="ci-badge">승인</span>':''}
    </div>`).join('');
  document.getElementById('wv-chips').innerHTML = cmds.map(c=>
    `<div class="wv-chip" onclick="insertCmd('${c.command}')">${c.command}</div>`
  ).join('');
}

// ── logout / new chat ──────────────────────────────────────────────────────
async function doLogout() {
  try {
    await fetch(`${GW}/session/end`,{
      method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({session_id:sessId})
    });
  } catch{}
  token=sessId=userName=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-overlay').style.display='flex';
  resetChat();
}

function newChat() {
  resetChat();
}

function resetChat() {
  const ca = document.getElementById('chat-area');
  ca.innerHTML = `<div class="welcome-view" id="welcome">
    <div class="wv-icon">M</div>
    <div class="wv-title">무엇을 도와드릴까요?</div>
    <div class="wv-sub">슬래시 커맨드를 입력하거나 아래 버튼을 클릭하세요</div>
    <div class="wv-chips" id="wv-chips"></div>
  </div>`;
  if (cmds.length) renderCmds();
  document.getElementById('inp').value = '';
  resize(document.getElementById('inp'));
}

// ── input ──────────────────────────────────────────────────────────────────
function resize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
}

function insertCmd(cmd) {
  const ta = document.getElementById('inp');
  ta.value = cmd + ' '; ta.focus(); resize(ta); hideSugg();
}

function onInput(ta) {
  resize(ta);
  const v = ta.value;
  if (v.startsWith('/') && v.length >= 1) {
    const q = v.toLowerCase();
    const matches = cmds.filter(c => c.command.toLowerCase().startsWith(q) || q === '/');
    renderSugg(matches);
  } else hideSugg();
}

function onKey(e) {
  const box = document.getElementById('sugg-box');
  if (box.style.display !== 'none') {
    const items = box.querySelectorAll('.sugg-item');
    const active = box.querySelector('.sugg-item.on');
    let idx = [...items].indexOf(active);
    if (e.key==='ArrowDown'){e.preventDefault();setActive(items,(idx+1)%items.length);return}
    if (e.key==='ArrowUp'){e.preventDefault();setActive(items,(idx-1+items.length)%items.length);return}
    if ((e.key==='Tab'||e.key==='Enter') && active){e.preventDefault();active.click();return}
    if (e.key==='Escape'){hideSugg();return}
  }
  if (e.key==='Enter' && !e.shiftKey){e.preventDefault();sendMsg()}
}

function setActive(items, i) {
  items.forEach(it=>it.classList.remove('on'));
  items[i]?.classList.add('on');
}

function renderSugg(list) {
  const box = document.getElementById('sugg-box');
  if (!list.length){hideSugg();return}
  box.innerHTML = list.map((c,i)=>`
    <div class="sugg-item${i===0?' on':''}" onclick="insertCmd('${c.command}')">
      <span class="si-cmd">${c.command}</span>
      <span class="si-desc">${c.description}</span>
      ${c.requires_approval?'<span class="si-note">승인 필요</span>':''}
    </div>`).join('');
  box.style.display = 'block';
}
function hideSugg(){document.getElementById('sugg-box').style.display='none'}

// ── send ───────────────────────────────────────────────────────────────────
async function sendMsg() {
  if (busy) return;
  const ta = document.getElementById('inp');
  const cmd = ta.value.trim();
  if (!cmd) return;
  ta.value = ''; resize(ta); hideSugg();

  document.getElementById('welcome')?.remove();
  appendUserRow(cmd);
  const botRow = appendBotRow();
  busy = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const r = await fetch(`${GW}/command`, {
      method:'POST',
      headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
      body: JSON.stringify({session_id:sessId, command:cmd})
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    await readStream(r, botRow);
  } catch(e) {
    setBody(botRow, '오류: '+e.message, true);
  } finally {
    busy = false;
    document.getElementById('send-btn').disabled = false;
    botRow.querySelector('.msg-body')?.classList.remove('typing');
    scrollBottom();
  }
}

// ── SSE ────────────────────────────────────────────────────────────────────
async function readStream(resp, botRow) {
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf='', txt='', curRow=botRow, afterApproval=false;

  while(true){
    const {done,value} = await reader.read();
    if(done) break;
    buf += dec.decode(value,{stream:true});
    const lines = buf.split('\n'); buf = lines.pop();
    for(const line of lines){
      if(!line.startsWith('data: ')) continue;
      const raw = line.slice(6);
      if(raw==='[DONE]') return;
      try{
        const obj = JSON.parse(raw);
        if(obj.type==='text'){
          if(afterApproval){ curRow=appendBotRow(); txt=''; afterApproval=false; }
          txt += obj.content||'';
          setBody(curRow, txt);
        } else if(obj.type==='error'){
          setBody(curRow, obj.content||'오류', true); return;
        } else if(obj.type==='approval'){
          showApproval(curRow, obj); afterApproval=true;
        }
      } catch{ txt+=raw; setBody(curRow,txt); }
      scrollBottom();
    }
  }
}

// ── approval ───────────────────────────────────────────────────────────────
function showApproval(row, obj){
  const body = row.querySelector('.msg-body');
  body.classList.remove('typing');
  body.innerHTML = `<div class="approval-card">
    <div class="approval-msg">⚠️ ${esc(obj.message||'승인이 필요합니다.')}</div>
    <div class="approval-btns">
      <button class="btn-approve" onclick="resolveApproval('${obj.approval_id}',true,this)">승인</button>
      <button class="btn-reject"  onclick="resolveApproval('${obj.approval_id}',false,this)">거절</button>
    </div>
  </div>`;
}

async function resolveApproval(aid, ok, btn){
  btn.closest('.approval-btns').querySelectorAll('button').forEach(b=>b.disabled=true);
  const msg = ok ? '✅ 승인됨 — 실행 중…' : '❌ 거절됨';
  const col = ok ? 'var(--green)' : 'var(--red)';
  btn.closest('.approval-card').innerHTML = `<div class="approval-msg" style="color:${col}">${msg}</div>`;
  try{
    await fetch(`${GW}/command/approve`,{
      method:'POST',
      headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({session_id:sessId,approval_id:aid,approved:ok})
    });
  }catch(e){console.error(e)}
}

// ── DOM helpers ─────────────────────────────────────────────────────────────
function appendUserRow(text){
  const el = mkRow('user-row-msg');
  el.innerHTML = `
    <div class="msg-avatar">${(userName||'U')[0].toUpperCase()}</div>
    <div class="msg-content">
      <div class="msg-body">${esc(text)}</div>
    </div>`;
  document.getElementById('chat-area').appendChild(el);
  scrollBottom();
}

function appendBotRow(){
  const el = mkRow('bot-row');
  el.innerHTML = `
    <div class="msg-avatar">M</div>
    <div class="msg-content">
      <div class="msg-meta">
        <span class="msg-name">Maha</span>
        <span class="msg-time">${ts()}</span>
      </div>
      <div class="msg-body typing"></div>
    </div>`;
  document.getElementById('chat-area').appendChild(el);
  scrollBottom();
  return el;
}

function mkRow(cls){
  const el = document.createElement('div');
  el.className = 'msg-row ' + cls;
  return el;
}

function setBody(row, text, isErr=false){
  const b = row.querySelector('.msg-body');
  b.className = 'msg-body typing' + (isErr?' error-body':'');
  const t = text.trim();
  if(!isErr && (t.startsWith('{') || t.startsWith('['))){
    try{ b.innerHTML=`<pre>${esc(JSON.stringify(JSON.parse(t),null,2))}</pre>`; return; }catch{}
  }
  if(!isErr && text.includes('\n')){
    b.innerHTML=`<pre>${esc(text)}</pre>`; return;
  }
  b.textContent = text;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function ts(){ return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) }
function scrollBottom(){
  const ca=document.getElementById('chat-area');
  ca.scrollTop=ca.scrollHeight;
}
</script>
